# Reference deployment profile. Keep the public control plane behind a TLS
# gateway/identity provider; the capability worker remains egress-free.
services:
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    image: forgeagent-control-plane:local
    ports:
      - "127.0.0.1:8090:8090"
    read_only: true
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.00
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    volumes:
      - forgeagent-data:/app/data
  capability-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: forgeagent-sandbox:local
    read_only: true
    user: "10001:10001"
    network_mode: "none"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 256m
    cpus: 0.50
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m

volumes:
  forgeagent-data:
