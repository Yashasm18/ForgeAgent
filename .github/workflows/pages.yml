name: Deploy Forge Ledger

on:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - "main.py"
      - "forgeagent/**/*.py"
      - ".github/workflows/pages.yml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    name: Gate Pages deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run proof suite
        run: python3 -m unittest discover -s tests -v
      - name: Validate hosted demo JavaScript
        run: |
          sed -n '/<script>/,/<\/script>/p' demo/index.html | sed '1d;$d' > /tmp/forgeagent-demo.js
          node --check /tmp/forgeagent-demo.js
  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Verify static judge demo
        run: test -f demo/index.html
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./demo
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
